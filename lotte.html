<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="image/common/youbin.svg" />
    <title>Lotte GRS | Park Yubin Portfolio</title>
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/lotte.css" />
    <link rel="stylesheet" href="css/common_rwd.css" />
    <link rel="stylesheet" href="css/lotte_rwd.css" />
  </head>
  <body class="project-page lotte-project">

    <div data-include="partials/header.html" data-header-variant="project"></div>

    <!--메인 영역-->
    <main>
      <!--히어로 영역-->
      <section class="project-showcase-hero lotte-hero">
        <div class="project-showcase-circle"></div>
        <div class="project-showcase-copy">
          <img class="project-showcase-logo" src="image/lotte/lotte_GRS_logo_white.svg" alt="Lotte GRS" />
          <h1>Lotte GRS</h1>
          <p>브랜드 경험을 선명하게 정리한 반응형 메인 페이지</p>
        </div>
        <div class="project-showcase-mockup">
          <img src="image/lotte/mockup_lotte.svg" alt="롯데 GRS 목업" />
        </div>
        <div class="project-showcase-actions">
          <a href="https://lotte-grs-redesign.netlify.app/" target="_blank" rel="noreferrer">사이트 보러가기</a>
        </div>
        <div class="project-showcase-details">
          <div class="project-showcase-info project-showcase-info--type">
            <strong>Personal Project</strong>
            <span>반응형 메인 페이지 리뉴얼</span>
          </div>
          <div class="project-showcase-info project-showcase-info--duration">
            <strong>Project&nbsp;&nbsp;&nbsp;&nbsp;Duration</strong>
            <span>Corporate Website Renewal</span>
          </div>
        </div>
      </section>

      <!--개요 영역-->
      <section class="content-section">
        <header class="section-heading">
          <p>Overview</p>
          <h2>흩어진 브랜드 정보를 한 화면에서 빠르게 이해하도록</h2>
        </header>
      </section>
    </main>

    <div data-include="partials/footer.html" data-footer-variant="project"></div>

    <script src="js/common.js"></script>
    <script src="js/subpage.js"></script>
  </body>
</html>

<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="image/common/youbin.svg" />
    <title>Index | Park Yubin Portfolio</title>
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/common_rwd.css" />
    <link rel="stylesheet" href="css/main_rwd.css" />
  </head>
  <body class="index-page">

    <div data-include="partials/header.html" data-header-variant="main"></div>

    <!--메인 영역-->
    <main class="index-main">
      <!--타이틀 영역-->
      <section class="index-hero">
        <h1>Index</h1>
      </section>

      <!--프로젝트 목록 영역-->
      <section class="index-project-list" aria-label="Portfolio project index">
        <article class="index-project">
          <a class="index-project-link" href="pdf/subpg_parley.pdf" target="_blank" rel="noreferrer" aria-label="Parley for the Ocean project page"></a>
          <header class="index-project-head">
            <span>(01)</span>
            <h2>Parley for the Ocean</h2>
          </header>
          <div class="index-image-row">
            <figure><img src="image/index/parley_index_2.jpg" alt="Parley ocean visual" /></figure>
            <figure><img src="image/index/parley_index_1.jpg" alt="Parley beach cleanup visual" /></figure>
            <figure><img src="image/index/parley_index_3.jpg" alt="Parley AIR campaign visual" /></figure>
          </div>
        </article>

        <article class="index-project index-project-right">
          <a class="index-project-link" href="pdf/subpg_lotte.pdf" target="_blank" rel="noreferrer" aria-label="Lotte GRS project page"></a>
          <header class="index-project-head">
            <span>(02)</span>
            <h2>Lotte GRS</h2>
          </header>
          <div class="index-image-row">
            <figure><img src="image/index/lotte_index_1.jpg" alt="Lotte GRS Lotteria fries visual" /></figure>
            <figure><img src="image/index/lotte_index_2.jpg" alt="Lotte GRS Krispy Kreme visual" /></figure>
            <figure><img src="image/index/lotte_index_3.jpg" alt="Lotte GRS Angelinus visual" /></figure>
          </div>
        </article>

        <article class="index-project">
          <a class="index-project-link" href="pdf/subpg_rockfish.pdf" target="_blank" rel="noreferrer" aria-label="Rockfish Weatherwear project page"></a>
          <header class="index-project-head">
            <span>(03)</span>
            <h2>Rockfish weatherwear</h2>
          </header>
          <div class="index-image-row">
            <figure><img src="image/index/rockfish_index_1.jpg" alt="Rockfish Weatherwear brand visual" /></figure>
            <figure><img src="image/index/rockfish_index_2.jpg" alt="Rockfish Weatherwear boots visual" /></figure>
            <figure><img src="image/index/rockfish_index_3.jpg" alt="Rockfish Weatherwear harbor visual" /></figure>
          </div>
        </article>
      </section>
    </main>

    <div data-include="partials/footer.html"></div>

    <script src="js/common.js"></script>
  </body>
</html>

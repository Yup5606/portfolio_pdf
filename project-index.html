<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="image/common/youbin.svg" />
    <title>Index | Park Yubin Portfolio</title>
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/common_rwd.css" />
    <link rel="stylesheet" href="css/main_rwd.css" />
  </head>
  <body class="index-page">

    <div data-include="partials/header.html" data-header-variant="main"></div>

    <!--메인 영역-->
    <main class="index-main">
      <!--타이틀 영역-->
      <section class="index-hero">
        <h1>Index</h1>
      </section>

      <!--프로젝트 목록 영역-->
      <section class="index-project-list" aria-label="Portfolio project index">
        <article class="index-project">
          <a class="index-project-link" href="parley.html" aria-label="Parley for the Ocean project page"></a>
          <header class="index-project-head">
            <span>(01)</span>
            <h2>Parley for the Ocean</h2>
          </header>
          <div class="index-image-row">
            <figure><img src="image/main/main_parley.jpg" alt="Parley main visual" /></figure>
            <figure><img src="image/parley/mockup-parley.jpg" alt="Parley mockup" /></figure>
            <figure><img src="image/parley/hero-desktop.png" alt="Parley desktop screen" /></figure>
          </div>
        </article>

        <article class="index-project index-project-right">
          <a class="index-project-link" href="lotte.html" aria-label="Lotte GRS project page"></a>
          <header class="index-project-head">
            <span>(02)</span>
            <h2>Lotte GRS</h2>
          </header>
          <div class="index-image-row">
            <figure><img src="image/main/main_lotte.jpg" alt="Lotte GRS main visual" /></figure>
            <figure><img src="image/lotte/mockup-lotte.jpg" alt="Lotte GRS mockup" /></figure>
            <figure><img src="image/lotte/hero-lotte.jpg" alt="Lotte GRS visual" /></figure>
          </div>
        </article>

        <article class="index-project">
          <a class="index-project-link" href="rockfish.html" aria-label="Rockfish Weatherwear project page"></a>
          <header class="index-project-head">
            <span>(03)</span>
            <h2>Rockfish weatherwear</h2>
          </header>
          <div class="index-image-row">
            <figure><img src="image/main/main_rockfish.jpg" alt="Rockfish Weatherwear main visual" /></figure>
            <figure><img src="image/rockfish/mockup-rockfish.jpg" alt="Rockfish mockup" /></figure>
            <figure><img src="image/rockfish/hero-rockfish.jpg" alt="Rockfish visual" /></figure>
          </div>
        </article>
      </section>
    </main>

    <div data-include="partials/footer.html" data-footer-variant="index"></div>

    <script src="js/common.js"></script>
  </body>
</html>

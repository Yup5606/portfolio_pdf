<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="image/common/youbin.svg" />
    <title>Park Yubin Portfolio</title>
    <link rel="stylesheet" href="css/common.css" />

    <link rel="stylesheet" href="css/common_rwd.css" />

  </head>
  <body class="home-page is-loading">
    <!--로딩 영역-->
    <div class="page-loader" aria-hidden="true">

      <p class="page-loader-text page-loader-name">Park Youbin</p>
      <p class="page-loader-text page-loader-field">UI UX Designer</p>

    <div data-include="partials/header.html" data-header-variant="main"></div>

    <!--메인 영역-->
    <main class="main-visual" data-main-slider>
      <!--팔리 프로젝트 영역-->
      <section class="main-panel main-panel-parley is-active" data-main-panel>
        <img class="panel-bg" src="image/main/main_parley.jpg" alt="Parley for the Ocean 메인 이미지" />
        <div class="panel-shade"></div>
        <a class="panel-link" href="pdf/subpg_parley.pdf" aria-label="Parley for the Ocean 프로젝트 보기"></a>
        <p class="panel-scroll">Scroll</p>
        <div class="panel-meta">
          <span>Team Project</span>
          <span>Responsive Web</span>
          <span>UI/UX</span>
          <span>Publishing</span>
        </div>
        <div class="panel-title-wrap">
          <p class="panel-count">(01)</p>
          <h1 class="panel-title"><a href="pdf/subpg_parley.pdf">Parley for the Ocean</a></h1>
        </div>
        <div data-include="partials/footer.html" data-footer-variant="panel"></div>

      <!--롯데 프로젝트 영역-->
      <section class="main-panel main-panel-lotte" data-main-panel>
        <img class="panel-bg" src="image/main/main_lotte.jpg" alt="Lotte GRS 메인 이미지" />
        <div class="panel-shade"></div>
        <a class="panel-link" href="pdf/subpg_lotte.pdf" aria-label="Lotte GRS 프로젝트 보기"></a>
        <p class="panel-scroll">Scroll</p>
        <div class="panel-meta">
          <span>Personal Project</span>
          <span>Corporate Renewal</span>
          <span>UI/UX</span>
          <span>Publishing</span>
        </div>
        <div class="panel-title-wrap">
          <p class="panel-count">(02)</p>
          <h2 class="panel-title"><a href="pdf/subpg_lotte.pdf">Lotte GRS</a></h2>
        </div>
        <div data-include="partials/footer.html" data-footer-variant="panel"></div>
      </section>

      <!--락피쉬 프로젝트 영역-->
      <section class="main-panel main-panel-rockfish" data-main-panel>
        <img class="panel-bg" src="image/main/main_rockfish.jpg" alt="Rockfish Weatherwear 메인 이미지" />
        <div class="panel-shade"></div>
        <a class="panel-link" href="pdf/subpg_rockfish.pdf" aria-label="Rockfish Weatherwear 프로젝트 보기"></a>
        <p class="panel-scroll">Scroll</p>
        <div class="panel-meta">
          <span>Brand Redesign</span>
          <span>Experience Design</span>
          <span>UI/UX</span>
          <span>Publishing</span>

          <p class="panel-count">(03)</p>
          <h2 class="panel-title"><a href="pdf/subpg_rockfish.pdf">Rockfish weatherwear</a></h2>
